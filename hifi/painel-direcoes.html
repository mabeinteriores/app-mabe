<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabe Comercial · Painel — direções hi-fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="painel.css">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  /* System sheet */
  .sys { font-family: 'Archivo', sans-serif; color: var(--ink); background: var(--surface); width: 100%; height: 100%; padding: 30px 32px; overflow: hidden; }
  .sys h2 { margin: 0 0 2px; font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
  .sys .lead { margin: 0 0 22px; color: var(--ink-2); font-size: 13.5px; max-width: 60ch; }
  .sys h4 { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); font-weight: 700; margin: 0 0 11px; }
  .sys .block { margin-bottom: 24px; }
  .sw-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 88px; }
  .sw .chip { height: 46px; border-radius: 8px; border: 1px solid var(--hair); }
  .sw .nm { font-size: 11px; font-weight: 600; margin-top: 6px; }
  .sw .hx { font-size: 10.5px; color: var(--ink-3); font-family: 'IBM Plex Mono', monospace; }
  .stages { display: flex; gap: 18px; flex-wrap: wrap; }
  .stage { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-2); }
  .stage i { width: 13px; height: 13px; border-radius: 4px; display: inline-block; }
  .type-row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--hair); padding: 9px 0; }
  .type-row .spec { width: 130px; font-size: 11px; color: var(--ink-3); font-family: 'IBM Plex Mono', monospace; flex: 0 0 auto; }
  .atoms { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="dashboard.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
function Swatch({ c, nm, hex }) {
  return (
    <div className="sw">
      <div className="chip" style={{ background: c }} />
      <div className="nm">{nm}</div>
      <div className="hx">{hex}</div>
    </div>
  );
}

function SystemSheet() {
  return (
    <div className="mabe skin-studio" data-theme="light" style={{ display: 'block' }}>
      <div className="sys">
        <h2>Sistema visual — Mabe Comercial</h2>
        <p className="lead">Base neutra quente (papel + tinta), um acento terracota e uma família grotesca neutra (Archivo). Números em mono (IBM Plex Mono) dão a precisão de ERP. Esta folha vale para as 3 direções ao lado.</p>

        <div className="block">
          <h4>Paleta base</h4>
          <div className="sw-row">
            <Swatch c="#f4f1ea" nm="Fundo" hex="#F4F1EA" />
            <Swatch c="#fffdf9" nm="Superfície" hex="#FFFDF9" />
            <Swatch c="#26241f" nm="Tinta" hex="#26241F" />
            <Swatch c="#6f6a60" nm="Tinta 2" hex="#6F6A60" />
            <Swatch c="#e7e0d2" nm="Hairline" hex="#E7E0D2" />
          </div>
        </div>

        <div className="block">
          <h4>Acento &amp; estados</h4>
          <div className="sw-row">
            <Swatch c="#c0673f" nm="Terracota" hex="#C0673F" />
            <Swatch c="#a44e29" nm="Terracota 2" hex="#A44E29" />
            <Swatch c="#f2e1d5" nm="Terracota soft" hex="#F2E1D5" />
            <Swatch c="#5d7e49" nm="Ganho" hex="#5D7E49" />
            <Swatch c="#b1503f" nm="Perda" hex="#B1503F" />
          </div>
        </div>

        <div className="block">
          <h4>Cores do funil</h4>
          <div className="stages">
            <span className="stage"><i style={{ background: '#b3a892' }} />Prospecção</span>
            <span className="stage"><i style={{ background: '#c79a3e' }} />Em negociação</span>
            <span className="stage"><i style={{ background: '#cf8338' }} />Proposta</span>
            <span className="stage"><i style={{ background: '#6f8d5a' }} />Fechado</span>
            <span className="stage"><i style={{ background: '#b1503f' }} />Perdido</span>
          </div>
        </div>

        <div className="block">
          <h4>Tipografia</h4>
          <div className="type-row"><span className="spec">Archivo 700 · 27</span><span style={{ fontSize: 27, fontWeight: 700, letterSpacing: '-.02em' }}>Painel de resultados</span></div>
          <div className="type-row"><span className="spec">Archivo 600 · 14</span><span style={{ fontSize: 14, fontWeight: 600 }}>Funil de oportunidades</span></div>
          <div className="type-row"><span className="spec">Archivo 400 · 13</span><span style={{ fontSize: 13 }}>Marina Costa · Alphaville / SP</span></div>
          <div className="type-row"><span className="spec">Plex Mono 600</span><span className="num" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, fontWeight: 600 }}>R$ 1.240.000 · 62%</span></div>
          <div className="type-row"><span className="spec">Micro-label</span><span className="ml">Comissões a receber</span></div>
        </div>

        <div className="block" style={{ marginBottom: 0 }}>
          <h4>Átomos</h4>
          <div className="atoms">
            <button className="btn primary">+  Nova oportunidade</button>
            <button className="btn">Filtrar</button>
            <span className="tag">Em negociação</span>
            <span className="rtpill" style={{ fontSize: 13 }}>RT R$ 16,2 mil</span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12.5, color: 'var(--win)' }}>▲ 18%</span>
          </div>
        </div>
      </div>
    </div>
  );
}

const W = 1280, H = 936;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="sistema" title="Sistema visual" subtitle="Tokens e fundamentos — comuns às 3 direções">
        <DCArtboard id="tokens" label="Fundamentos" width={760} height={H}>
          <SystemSheet />
        </DCArtboard>
      </DCSection>

      <DCSection id="direcoes" title="Painel — 3 direções" subtitle="Mesma estrutura (variação A: KPIs + funil), estéticas diferentes · tema claro">
        <DCArtboard id="paper" label="1 · Ateliê — editorial, papel, sem caixas" width={W} height={H}>
          <MabeDashboard skin="paper" theme="light" />
        </DCArtboard>
        <DCArtboard id="studio" label="2 · Studio — cartões, sombra suave, acento" width={W} height={H}>
          <MabeDashboard skin="studio" theme="light" />
        </DCArtboard>
        <DCArtboard id="tech" label="3 · Mesa técnica — denso, mono, ERP" width={W} height={H}>
          <MabeDashboard skin="tech" theme="light" />
        </DCArtboard>
      </DCSection>

      <DCSection id="escuro" title="Prévia · tema escuro" subtitle="A direção escolhida ganha o par claro/escuro completo">
        <DCArtboard id="studio-dark" label="2 · Studio — escuro" width={W} height={H}>
          <MabeDashboard skin="studio" theme="dark" />
        </DCArtboard>
        <DCArtboard id="tech-dark" label="3 · Mesa técnica — escuro" width={W} height={H}>
          <MabeDashboard skin="tech" theme="dark" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
